<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ade's Rock, Paper, Scissors Game</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameTitle">ROCK, PAPER, SCISSORS</div>

    <div class="score-board-container">
        <p class="text score-board">SCORE BOARD</p>

        <div class="score-subcontainer">
            <div class="scores-rounds">
                <div class="text player-score">
                    <p class="text-label">YOUR SCORE</p>
                    <p id="user-score">0</p>
                </div>

                <div class="text player-score round">
                    <p class="text-label">ROUND</p>
                    <p id="current-round">0</p>
                </div>

                <div class="text player-score">
                    <p class="text-label">COMPUTER SCORE</p>
                    <p id="computer-score">0</p>
                </div>
            </div>
        </div>

        <div class="text gameDetails">GAME STATUS</div>
        <div class="game-deets-container">
            <div class="text" id="status">ROUND 1 STARTS NOW</div>
            <div class="text" id="who-beats-who">Awaiting your move...</div>
        </div>

        <div class="selection-container">
            <button class="text selection" id="rock">ROCK</button>
            <button class="text selection" id="paper">PAPER</button>
            <button class="text selection" id="scissors">SCISSORS</button>
        </div>

        <div class="text footnote">Make your selection to play!</div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-inner">
            <h2 id="modal-headtext">YOU WON!</h2>
            <p id="modalText">
                You've beaten the computer!<br>
                Thanks for playing!
            </p>
            
            <div class="close-modal" id="closeModal">Close</div>
        </div>
    </div>

    <footer>
        <div class="text">&copy; Copyright @blond3334d || The Odin Project</div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
